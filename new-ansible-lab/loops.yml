- name: Looping playbook
  hosts: web
  become: yes
  tasks:
    - name: Install packages
      apt:
        name: "{{ item }}"
        state: present
      with_items:
        - nginx
        - curl
        - git

    - name: Create files
      file:
        path: "~/new-ansible-lab/{{ item }}"
        state: touch
      with_items:
        - file1.txt
        - file2.txt
        - file3.txt
        - file4.txt
        - file5.txt
      become: no
